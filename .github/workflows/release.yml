name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build archive
        run: |
          xcodebuild archive \
            -scheme LocalDock \
            -configuration Release \
            -archivePath $RUNNER_TEMP/LocalDock.xcarchive \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Export app
        run: |
          mkdir -p $RUNNER_TEMP/app
          cp -R $RUNNER_TEMP/LocalDock.xcarchive/Products/Applications/LocalDock.app $RUNNER_TEMP/app/

      - name: Create DMG
        run: |
          brew install create-dmg
          create-dmg \
            --volname "Local Dock" \
            --volicon "$RUNNER_TEMP/app/LocalDock.app/Contents/Resources/AppIcon.icns" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "LocalDock.app" 150 185 \
            --app-drop-link 450 185 \
            --hide-extension "LocalDock.app" \
            "$RUNNER_TEMP/LocalDock.dmg" \
            "$RUNNER_TEMP/app/" || true

      - name: Upload DMG
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ runner.temp }}/LocalDock.dmg
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
